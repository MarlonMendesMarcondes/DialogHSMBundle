; 360dialog WhatsApp Plugin - English Translations

; Config
dialoghsm.config.api_key="API Key (D360-API-KEY)"
dialoghsm.config.consumer_limit="Consumer Limit (messages per execution)"
dialoghsm.config.consumer_limit.tooltip="Maximum number of WhatsApp messages the consumer will process per execution of dialoghsm:consume."
dialoghsm.config.consumer_limit.help="Default: 50. Example: 30 = process up to 30 messages per execution."
dialoghsm.config.base_url="API Base URL"
dialoghsm.config.batch_consumer_limit="Batch Consumer Limit (messages per execution)"
dialoghsm.config.batch_consumer_limit.tooltip="Exact number of WhatsApp messages the batch consumer will process per execution (every 10 minutes). Independent from consumer_limit (bulk)."
dialoghsm.config.batch_consumer_limit.help="Default: 100. Example: 100 = process exactly 100 messages per batch execution."
dialoghsm.config.bulk_rate_per_minute="Bulk Rate Limit (messages/min)"
dialoghsm.config.bulk_rate_per_minute.tooltip="Maximum number of bulk WhatsApp messages sent per minute (via RabbitMQ queue). Uses Redis sliding window — no locks, no bursts. Set to 0 to disable."
dialoghsm.config.bulk_rate_per_minute.help="0 = unlimited. Example: 120 = send up to 2 messages per second, distributed evenly."
dialoghsm.config.batch_rate_per_minute="Batch Rate Limit (messages/min)"
dialoghsm.config.batch_rate_per_minute.tooltip="Maximum number of batch WhatsApp messages sent per minute (business hours queue). Uses the same Redis sliding window as bulk — separate keys, no interference. Set to 0 to disable."
dialoghsm.config.batch_rate_per_minute.help="0 = unlimited. Example: 60 = send up to 1 message per second, distributed evenly."
dialoghsm.config.log_max_records="Max Log Records"
dialoghsm.config.log_max_records.tooltip="Maximum number of log records to keep (count-based limit, applied after age pruning)."
dialoghsm.config.log_max_records.help="Default: 100,000. Allowed range: 1,000 to 10,000,000."
dialoghsm.config.log_max_days="Log Retention (days)"
dialoghsm.config.log_max_days.tooltip="Records older than this many days are deleted first, then count-based pruning is applied. Set to 0 to disable age-based pruning."
dialoghsm.config.log_max_days.help="Default: 30 days. Set 0 to keep records indefinitely (count limit still applies)."

