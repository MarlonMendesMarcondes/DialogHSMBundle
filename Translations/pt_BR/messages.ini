dialoghsm.config.log_max_records.help="Padrão: 100.000. Intervalo permitido: 1.000 a 10.000.000."
dialoghsm.config.log_max_days="Retenção de Logs (dias)"
dialoghsm.config.log_max_days.tooltip="Registros com mais de X dias são removidos primeiro; depois aplica-se o limite por quantidade. Use 0 para desativar a limpeza por idade."
dialoghsm.config.log_max_days.help="Padrão: 30 dias. Use 0 para manter registros indefinidamente (o limite por quantidade ainda se aplica)."

