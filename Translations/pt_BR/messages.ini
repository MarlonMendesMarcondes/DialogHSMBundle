dialoghsm.config.bulk_rate_per_minute="Limite de Envio Bulk (mensagens/min)"
dialoghsm.config.bulk_rate_per_minute.tooltip="Máximo de mensagens WhatsApp enviadas por minuto no modo bulk (fila RabbitMQ). Usa sliding window no Redis — sem locks, sem burst. 0 = ilimitado."
dialoghsm.config.bulk_rate_per_minute.help="0 = sem limite. Exemplo: 120 = até 2 mensagens por segundo, distribuídas uniformemente."
dialoghsm.config.batch_rate_per_minute="Limite de Envio Batch (mensagens/min)"
dialoghsm.config.batch_rate_per_minute.tooltip="Máximo de mensagens WhatsApp enviadas por minuto no modo batch (horário comercial). Usa o mesmo mecanismo de sliding window no Redis do bulk — chaves separadas, sem interferência. 0 = ilimitado."
dialoghsm.config.batch_rate_per_minute.help="0 = sem limite. Exemplo: 60 = até 1 mensagem por segundo, distribuída uniformemente."
dialoghsm.config.log_max_records="Máximo de Registros no Log"
