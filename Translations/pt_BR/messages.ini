; Config
dialoghsm.config.api_key="Chave da API (D360-API-KEY)"
dialoghsm.config.consumer_limit="Limite do Consumer (mensagens por execução)"
dialoghsm.config.consumer_limit.tooltip="Número máximo de mensagens WhatsApp que o consumer processará por execução do dialoghsm:consume."
dialoghsm.config.consumer_limit.help="Padrão: 50. Exemplo: 30 = processar até 30 mensagens por execução."
